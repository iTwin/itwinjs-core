name: Request a feature
description: New ideas & improvements to iTwin.js are always welcome.
labels: ["needs triage", "type - enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping make iTwin.js better!

        When suggesting an idea, give examples of the intended use case. Features that benefit the wider community are more likely to be prioritized.
  - type: textarea
    id: use-case
    attributes:
      label: Use case
      description: "Explain the real-world problem this solves and how it benefits the wider community, not just your project."
    validations:
      required: true
  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed solution
      description: "Suggest how it should work (e.g., API design ideas, new configuration flags, expected behavior)."
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: "Explain why current workarounds or existing features don't solve your problem."
    validations:
      required: true
  - type: checkboxes
    id: contribution
    attributes:
      label: Willingness to contribute
      options:
        - label: I am willing to write the code or documentation for this feature.
          required: false
  - type: checkboxes
    id: ai-acknowledgment
    attributes:
      label: AI acknowledgment
      options:
        - label: I used AI to generate this feature request.
          required: false
        - label: (If the above is checked) I have reviewed the AI-generated content before submitting.
          required: false
  - type: markdown
    attributes:
      value: |
        The best way to get your ideas into iTwin.js is to help us! We love contributions and are always happy to provide feedback and advice. Check out the contributor guide to get started: [CONTRIBUTING.md](https://github.com/iTwin/itwinjs-core/blob/master/CONTRIBUTING.md)
