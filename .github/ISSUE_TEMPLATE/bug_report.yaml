name: Report a bug
description: Let us know so we can fix it!
labels: ["needs triage", "type - bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping us improve iTwin.js! Please describe what the expected behavior is vs what actually happens.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Also tell us, what did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: "How do you trigger this bug? Please walk us through it step by step."
      value: |
        1.
        2.
        3.
        ...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: What OS, Browser, and iTwin.js version are you experiencing this issue on?
      value: |
        iTwin.js Version:
        Operating System:
        Browser (if applicable):
    validations:
      required: true
  - type: checkboxes
    id: ai-acknowledgment
    attributes:
      label: AI acknowledgment
      options:
        - label: I used AI to generate this issue report.
          required: false
        - label: (If the above is checked) I have reviewed the AI-generated content before submitting.
          required: false
  - type: markdown
    attributes:
      value: |
        If you can also contribute a fix, we'd absolutely appreciate it!

        Check out the contributor guide to get started: [CONTRIBUTING.md](https://github.com/iTwin/itwinjs-core/blob/master/CONTRIBUTING.md)

        Just let us know you're working on it and we'd be happy to provide advice and feedback.
