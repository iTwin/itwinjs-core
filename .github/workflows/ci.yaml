name: CI

on:
  pull_request:
    branches:
      - master
      - "release/**"
    paths-ignore:
      - "**/*.md"
      - docs/**
      - .github/CODEOWNERS
      - common/changes/**/*.json
      - "**/CHANGELOG.json"
      - "**/CHANGELOG.md"
  schedule:
    # Nightly audit run at 05:00 UTC — only the `audit` job runs on schedule.
    # All other jobs are pull_request only; master pushes are assumed clean.
    - cron: "0 5 * * *"

# Cancel in-progress runs for the same PR when new commits are pushed.
concurrency:
  group: ci-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # rush check — verify no inconsistent dependency versions across packages.
  # PR only: master is assumed to have passed this check before merging.
  # ---------------------------------------------------------------------------
  rush-check:
    if: github.event_name == 'pull_request'
    name: rush check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        # actions/checkout v6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Rush setup
        uses: ./.github/actions/rush-setup

      - name: rush check
        run: node common/scripts/install-run-rush.js check

  # ---------------------------------------------------------------------------
  # rush change — verify that all changed packages have a changelog entry.
  # PR only.
  # ---------------------------------------------------------------------------
  rush-change:
    if: github.event_name == 'pull_request'
    name: rush change
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        # actions/checkout v6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          # Fetch enough history for rush change to compare against the base branch.
          fetch-depth: 0

      - name: Rush setup
        uses: ./.github/actions/rush-setup

      - name: rush change -v
        run: node common/scripts/install-run-rush.js change -v -b origin/${{ github.base_ref }}

  # ---------------------------------------------------------------------------
  # audit — run pnpm security audit.
  # Runs on pull_request AND on a nightly schedule.
  # Separated from the build+test matrix so that an audit failure never masks
  # real test regressions in the main CI.
  # ---------------------------------------------------------------------------
  audit:
    if: github.event_name == 'pull_request' || github.event_name == 'schedule'
    name: rush audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        # actions/checkout v6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Rush setup
        uses: ./.github/actions/rush-setup

      - name: rush audit
        run: node common/scripts/install-run-rush.js audit

  # ---------------------------------------------------------------------------
  # lint-and-extract-api — build once, then run lint and extract-api checks.
  # PR only: master is assumed to have passed before merging.
  # Both checks always run even if the other fails; the job fails if either
  # check fails (tracked via step outcomes, reported at the end).
  # Note: build is required before lint because TSC produces the type info
  # that ESLint rules (including the deprecation rule) consume.
  # No artifact upload for extract-api — api.md changes are visible in the PR diff.
  # ---------------------------------------------------------------------------
  lint-and-extract-api:
    if: github.event_name == 'pull_request'
    name: rush lint + extract-api
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        # actions/checkout v6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Rush setup
        uses: ./.github/actions/rush-setup

      - name: rush build
        run: node common/scripts/install-run-rush.js build -v -p max --to-version-policy prerelease-monorepo-lockStep
        env:
          VITE_CI: true

      - name: rush lint
        id: lint
        continue-on-error: true
        run: node common/scripts/install-run-rush.js lint

      - name: rush extract-api
        id: extract_api
        continue-on-error: true
        run: node common/scripts/install-run-rush.js extract-api --to-version-policy prerelease-monorepo-lockStep

      - name: Assert no uncommitted api changes
        id: api_diff
        continue-on-error: true
        shell: bash
        run: |
          if [ $(git status --porcelain | wc -l) -ne "0" ]; then
            echo "The following file(s) have uncommitted API changes:"
            git status --porcelain -u
            echo ""
            echo "Please run 'rush extract-api' locally, commit the modified api.md"
            echo "files, and run 'rush change' for affected packages."
            echo ""
            echo "Diff:"
            git diff
            exit 1
          fi

      - name: Report results
        if: always()
        shell: bash
        run: |
          FAILED=0
          if [ "${{ steps.lint.outcome }}" = "failure" ]; then
            echo "::error::rush lint failed"
            FAILED=1
          fi
          if [ "${{ steps.extract_api.outcome }}" = "failure" ] || [ "${{ steps.api_diff.outcome }}" = "failure" ]; then
            echo "::error::rush extract-api found uncommitted api.md changes"
            FAILED=1
          fi
          exit $FAILED

  # ---------------------------------------------------------------------------
  # unit-test — run unit tests for all native-free published packages and
  # upload coverage to Codecov for visibility.
  #
  # This job is INFORMATIONAL: continue-on-error: true means it never blocks
  # a PR merge. Unit tests and the ADO pipeline remain the merge gate.
  #
  # @itwin/core-backend requires native bindings unavailable on GH-hosted
  # runners; its cover step is expected to fail and is handled via
  # continue-on-error on that step. All other packages run normally.
  # ---------------------------------------------------------------------------
  unit-test:
    if: github.event_name == 'pull_request'
    name: unit tests
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        # actions/checkout v6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Rush setup
        uses: ./.github/actions/rush-setup

      - name: Install Playwright browsers
        # Required by @itwin/core-frontend which uses vitest + playwright/chromium.
        run: npx playwright install chromium --with-deps

      - name: rush build
        run: node common/scripts/install-run-rush.js build -v -p max --to-version-policy prerelease-monorepo-lockStep
        env:
          VITE_CI: true

      - name: rush cover
        # continue-on-error: core-backend will fail (native bindings not available).
        # All other packages run; whatever coverage is produced gets uploaded below.
        continue-on-error: true
        run: |
          xvfb-run --auto-servernum --server-args='-screen 0 1600x900x24' \
            node common/scripts/install-run-rush.js cover \
            --to-version-policy prerelease-monorepo-lockStep
        env:
          NODE_ENV: development

      - name: Upload coverage to Codecov
        # codecov/codecov-action v6.0.1
        # Comment behavior is controlled by codecov.yml at the repo root:
        # comment is disabled, status checks are informational.
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354
        with:
          fail_ci_if_error: false
