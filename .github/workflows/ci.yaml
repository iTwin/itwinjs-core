# iTwin.js Core CI Build (GitHub Actions)
#
# Ported from: common/config/azure-pipelines/ci.yaml
#
# This build validates iTwin.js core on GitHub-hosted runners for
# Linux only as a focused larger-runner PoC. It runs on a daily schedule
# and can be triggered manually via workflow_dispatch.
#
# For the main CI on self-hosted runners, see jobs/fast-ci.yaml (ADO, not yet ported).
#
# Runner target for this PoC:
#   ubuntu-runner-8
#
# ⚠ Prerequisites for this runner:
#   1. Org admin enables the runner / larger-runner backing capacity
#   2. Repo granted access to the runner group
#   3. Spending limit / billing enabled for Actions minutes if applicable
#   If the runner is unavailable, jobs will queue indefinitely.
#
# Note: this workflow covers the GHA-port subset of CI (not the full ADO fast-ci workload).
# Treat results as a benchmark signal for Linux runner performance, not a complete
# self-hosted replacement proof.

name: CI

on:
  schedule:
    - cron: "0 5 * * *" # Daily 5:00 UTC
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-runner-8
    timeout-minutes: 120
    permissions:
      checks: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 24.x
        uses: actions/setup-node@v4
        with:
          node-version: "24.x"

      - name: Git config
        shell: bash
        run: |
          git config --local user.email imodeljs-admin@users.noreply.github.com
          git config --local user.name imodeljs-admin

      - name: Rush check
        shell: bash
        run: node common/scripts/install-run-rush.js check

      - name: Rush change verification
        shell: bash
        run: |
          BRANCH_ARG=""
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            TARGET="${{ github.base_ref }}"
            if [[ "$TARGET" == *"release"* ]]; then
              BRANCH_ARG="-b origin/$TARGET"
            fi
          fi
          node common/scripts/install-run-rush.js change -v $BRANCH_ARG

      - name: Rush install
        shell: bash
        run: node common/scripts/install-run-rush.js install

      - name: Rush audit
        shell: bash
        run: node common/scripts/install-run-rush.js audit
        continue-on-error: true

      - name: Set Rush build cache variables
        shell: bash
        run: |
          WRITE_ALLOWED=0
          if [ "$RUNNER_OS" = "Linux" ] && [ "${{ github.event_name }}" != "pull_request" ]; then
            WRITE_ALLOWED=1
          fi
          echo "RUSH_BUILD_CACHE_WRITE_ALLOWED=$WRITE_ALLOWED" >> "$GITHUB_ENV"

      - name: Rush build
        shell: bash
        run: node common/scripts/install-run-rush.js build -v -p max
        env:
          RUSH_BUILD_CACHE_CREDENTIAL: ${{ secrets.RUSH_BUILD_CACHE_SAS }}
          RUSH_BUILD_CACHE_ENABLED: ${{ secrets.RUSH_BUILD_CACHE_SAS != '' && '1' || '0' }}
          VITE_CI: "true"

      - name: Rush lint
        shell: bash
        run: node common/scripts/install-run-rush.js lint

      - name: Rush webpack:test
        shell: bash
        run: node common/scripts/install-run-rush.js webpack:test -v

      # Electron 42+ no longer downloads the binary during npm install (postinstall removed).
      # Ensure the binary is present before configuring the AppArmor profile on Ubuntu 24.04.
      - name: Ensure Electron binary is downloaded
        if: runner.os == 'Linux'
        shell: bash
        run: |
          ELECTRON_DIR=$(find "$PWD/common/temp/node_modules/.pnpm" -path "*/electron@*/node_modules/electron" -type d 2>/dev/null | head -n 1)
          if [ ! -d "$ELECTRON_DIR" ]; then
            echo "::warning::Unable to find Electron package directory"
          elif [ -f "$ELECTRON_DIR/dist/electron" ]; then
            echo "Electron binary already present"
          elif [ -f "$ELECTRON_DIR/install.js" ]; then
            echo "Downloading Electron binary..."
            node "$ELECTRON_DIR/install.js"
          else
            echo "::warning::Unable to find Electron install script at $ELECTRON_DIR/install.js"
          fi

      # Ubuntu 24.04 restricts unprivileged user namespaces by default via AppArmor.
      # Electron's sandbox requires user namespaces, so allow them for the test binary.
      - name: Setup AppArmor profile for Electron
        if: runner.os == 'Linux'
        shell: bash
        run: |
          ELECTRON_PATH=$(find "$PWD/common/temp/node_modules/.pnpm" -path "*/electron@*/node_modules/electron/dist/electron" -type f 2>/dev/null | head -n 1)
          if [ -x "$ELECTRON_PATH" ]; then
            PROFILE_NAME="electron-test"
            PROFILE_PATH="/etc/apparmor.d/${PROFILE_NAME}"
            sudo tee "$PROFILE_PATH" > /dev/null <<EOF
          abi <abi/4.0>,
          include <tunables/global>

          profile ${PROFILE_NAME} ${ELECTRON_PATH} flags=(unconfined) {
            userns,
          }
          EOF
            sudo apparmor_parser -r "$PROFILE_PATH"
            echo "Loaded AppArmor profile for $ELECTRON_PATH"
          else
            echo "::warning::Unable to find Electron binary for AppArmor profile"
          fi

      - name: Rush cover (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: xvfb-run --auto-servernum --server-args='-screen 0, 1600x900x24' node common/scripts/install-run-rush.js cover --verbose
        env:
          NODE_ENV: development

      - name: Rush cover (Windows/macOS)
        if: runner.os != 'Linux'
        shell: bash
        run: node common/scripts/install-run-rush.js cover --verbose
        env:
          NODE_ENV: development

      - name: Rush docs
        shell: bash
        run: node common/scripts/install-run-rush.js docs

      # Test result publishing — ADO ci.yaml doesn't do this (fast-ci does),
      # but it's useful signal and validates the reporting pattern for Phase 3.
      - name: Publish test results
        uses: mikepenz/action-junit-report@v5
        if: always()
        with:
          check_name: "Test Results (Linux)"
          report_paths: "**/junit_results.xml"
          include_passed: false
          detailed_summary: true
