# iTwin.js Core CI Build (GitHub Actions)
#
# Ported from: common/config/azure-pipelines/ci.yaml
#
# This build validates iTwin.js core on GitHub-hosted runners across
# Windows, Linux, and macOS. It runs on a daily schedule and can be
# triggered manually via workflow_dispatch.
#
# For the main CI on self-hosted runners, see jobs/fast-ci.yaml (ADO, not yet ported).
#
# Runner tiers (controlled via workflow_dispatch input):
#   8core (default): ubuntu-22.04-8core / windows-2022-8core / macos-latest
#     Specs:    8 vCPU, 32 GB RAM, 300 GB SSD (Linux/Win); macOS stays standard
#     Cost:     ~$0.022/min Linux, ~$0.042/min Windows (vs $0.008/$0.016 standard)
#     Benefit:  doubles cores vs standard; 300 GB disk eliminates artifact pressure
#   16core:    ubuntu-22.04-16core / windows-2022-16core / macos-latest
#     Specs:    16 vCPU, 64 GB RAM, 600 GB SSD
#     Cost:     ~$0.042/min Linux, ~$0.082/min Windows — step up if 8core still bottlenecks
#   standard:  ubuntu-latest / windows-latest / macos-latest (free-tier, 4-core)
#
# ⚠ Prerequisites for the 'larger' tier (one-time org setup):
#   1. Org admin enables larger runners: Settings → Actions → Runners → New larger runner
#   2. Repo granted access to the runner group
#   3. Spending limit / billing enabled for Actions minutes
#   If runners are unavailable, jobs queue indefinitely — fall back to 'standard' input.
#
# Note: this workflow covers the GHA-port subset of CI (not the full ADO fast-ci workload).
# Treat results as a benchmark signal, not a complete self-hosted replacement proof.

name: CI

on:
  schedule:
    - cron: "0 5 * * *" # Daily 5:00 UTC
  workflow_dispatch:
    inputs:
      runner-tier:
        description: "Runner tier: 8core = paid 8-core (default); 16core = paid 16-core; standard = free 4-core"
        required: false
        default: "8core"
        type: choice
        options:
          - 8core
          - 16core
          - standard

# Include runner-tier in concurrency key so manual A/B comparisons don't cancel each other.
concurrency:
  group: ci-${{ github.ref }}-${{ inputs.runner-tier || '8core' }}
  cancel-in-progress: true

jobs:
  # Emits a JSON matrix so the build job can switch runner labels at runtime.
  # On scheduled runs inputs.runner-tier is empty; the explicit default keeps behavior consistent.
  runner-config:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.pick.outputs.matrix }}
    steps:
      - id: pick
        shell: bash
        run: |
          TIER="${{ inputs.runner-tier || '8core' }}"
          if [[ "$TIER" == "standard" ]]; then
            echo 'matrix={"include":[{"runner":"ubuntu-latest","name":"Linux"},{"runner":"windows-latest","name":"Windows"},{"runner":"macos-latest","name":"macOS"}]}' >> "$GITHUB_OUTPUT"
          elif [[ "$TIER" == "16core" ]]; then
            # macOS larger runners cost $0.10–0.15/min — not justified for this workload.
            echo 'matrix={"include":[{"runner":"ubuntu-22.04-16core","name":"Linux"},{"runner":"windows-2022-16core","name":"Windows"},{"runner":"macos-latest","name":"macOS"}]}' >> "$GITHUB_OUTPUT"
          else
            # 8core default: 8 vCPU, 32 GB RAM, 300 GB SSD — good starting point for PoC
            # macOS larger runners cost $0.10–0.15/min — not justified for this workload.
            echo 'matrix={"include":[{"runner":"ubuntu-22.04-8core","name":"Linux"},{"runner":"windows-2022-8core","name":"Windows"},{"runner":"macos-latest","name":"macOS"}]}' >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: runner-config
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.runner-config.outputs.matrix) }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 120
    permissions:
      checks: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./.github/actions/core-build
        with:
          node-version: "24.x"
          rush-build-cache-credential: ${{ secrets.RUSH_BUILD_CACHE_SAS }}

      # Test result publishing — ADO ci.yaml doesn't do this (fast-ci does),
      # but it's useful signal and validates the reporting pattern for Phase 3.
      - name: Publish test results
        uses: mikepenz/action-junit-report@v5
        if: always()
        with:
          check_name: "Test Results (${{ matrix.name }})"
          report_paths: "**/junit_results.xml"
          include_passed: false
          detailed_summary: true
