# Slash Command: /test
#
# Replaces ADO's `/azp run imodeljs.imodeljs` comment trigger for fork PRs.
#
# When an org member or collaborator comments `/test` on a PR, this workflow
# checks out the PR code and runs the full CI build on GitHub-hosted runners.
#
# Security model:
#   - Only users with write access can trigger (prevents abuse from random commenters)
#   - Runs on GitHub-hosted runners only (no self-hosted runner exposure to fork code)
#   - Workflow file runs from default branch (issue_comment always does this)
#   - PR code is checked out and executed — same trust model as ADO's /azp run
#
# NOTE: issue_comment workflows only fire when present on the DEFAULT BRANCH.
# This file must be merged to master before the /test command will work.

name: "Slash Command: /test"

on:
  issue_comment:
    types: [created]

jobs:
  trigger:
    # Only run on PR comments (not issues) that start with /test
    if: >-
      github.event.issue.pull_request
      && startsWith(github.event.comment.body, '/test')
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.pr.outputs.sha }}
    permissions:
      pull-requests: read
      # Needed to add reaction to the comment
      issues: write
    steps:
      - name: Check permissions
        uses: actions/github-script@v7
        with:
          script: |
            const { data: perm } = await github.rest.repos.getCollaboratorPermissionLevel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              username: context.payload.comment.user.login,
            });
            if (!['admin', 'write'].includes(perm.permission)) {
              core.setFailed(`User ${context.payload.comment.user.login} does not have write access`);
              return;
            }
            // Acknowledge the command with a rocket reaction
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'rocket',
            });

      - name: Get PR details
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });
            core.setOutput('sha', pr.head.sha);
            core.info(`PR #${pr.number}: ${pr.head.sha} (${pr.head.ref})`);

  build:
    needs: trigger
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    permissions:
      checks: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.trigger.outputs.sha }}
          fetch-depth: 0

      - name: Setup Node.js 24.x
        uses: actions/setup-node@v4
        with:
          node-version: "24.x"

      - name: Git config
        shell: bash
        run: |
          git config --local user.email imodeljs-admin@users.noreply.github.com
          git config --local user.name imodeljs-admin

      - name: Rush check
        shell: bash
        run: node common/scripts/install-run-rush.js check

      - name: Rush change verification
        shell: bash
        run: |
          BRANCH_ARG=""
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            TARGET="${{ github.base_ref }}"
            if [[ "$TARGET" == *"release"* ]]; then
              BRANCH_ARG="-b origin/$TARGET"
            fi
          fi
          node common/scripts/install-run-rush.js change -v $BRANCH_ARG

      - name: Rush install
        shell: bash
        run: node common/scripts/install-run-rush.js install

      - name: Rush audit
        shell: bash
        run: node common/scripts/install-run-rush.js audit
        continue-on-error: true

      - name: Set Rush build cache variables
        shell: bash
        run: |
          WRITE_ALLOWED=0
          if [ "$RUNNER_OS" = "Linux" ] && [ "${{ github.event_name }}" != "pull_request" ]; then
            WRITE_ALLOWED=1
          fi
          echo "RUSH_BUILD_CACHE_WRITE_ALLOWED=$WRITE_ALLOWED" >> "$GITHUB_ENV"

      - name: Rush build
        shell: bash
        run: node common/scripts/install-run-rush.js build -v -p max
        env:
          RUSH_BUILD_CACHE_CREDENTIAL: ${{ secrets.RUSH_BUILD_CACHE_SAS }}
          RUSH_BUILD_CACHE_ENABLED: ${{ secrets.RUSH_BUILD_CACHE_SAS != '' && '1' || '0' }}
          VITE_CI: "true"

      - name: Rush lint
        shell: bash
        run: node common/scripts/install-run-rush.js lint

      - name: Rush webpack:test
        shell: bash
        run: node common/scripts/install-run-rush.js webpack:test -v

      # Electron 42+ no longer downloads the binary during npm install (postinstall removed).
      # Ensure the binary is present before configuring the AppArmor profile on Ubuntu 24.04.
      - name: Ensure Electron binary is downloaded
        if: runner.os == 'Linux'
        shell: bash
        run: |
          ELECTRON_DIR=$(find "$PWD/common/temp/node_modules/.pnpm" -path "*/electron@*/node_modules/electron" -type d 2>/dev/null | head -n 1)
          if [ ! -d "$ELECTRON_DIR" ]; then
            echo "::warning::Unable to find Electron package directory"
          elif [ -f "$ELECTRON_DIR/dist/electron" ]; then
            echo "Electron binary already present"
          elif [ -f "$ELECTRON_DIR/install.js" ]; then
            echo "Downloading Electron binary..."
            node "$ELECTRON_DIR/install.js"
          else
            echo "::warning::Unable to find Electron install script at $ELECTRON_DIR/install.js"
          fi

      # Ubuntu 24.04 restricts unprivileged user namespaces by default via AppArmor.
      # Electron's sandbox requires user namespaces, so allow them for the test binary.
      - name: Setup AppArmor profile for Electron
        if: runner.os == 'Linux'
        shell: bash
        run: |
          ELECTRON_PATH=$(find "$PWD/common/temp/node_modules/.pnpm" -path "*/electron@*/node_modules/electron/dist/electron" -type f 2>/dev/null | head -n 1)
          if [ -x "$ELECTRON_PATH" ]; then
            PROFILE_NAME="electron-test"
            PROFILE_PATH="/etc/apparmor.d/${PROFILE_NAME}"
            sudo tee "$PROFILE_PATH" > /dev/null <<EOF
          abi <abi/4.0>,
          include <tunables/global>

          profile ${PROFILE_NAME} ${ELECTRON_PATH} flags=(unconfined) {
            userns,
          }
          EOF
            sudo apparmor_parser -r "$PROFILE_PATH"
            echo "Loaded AppArmor profile for $ELECTRON_PATH"
          else
            echo "::warning::Unable to find Electron binary for AppArmor profile"
          fi

      - name: Rush cover (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: xvfb-run --auto-servernum --server-args='-screen 0, 1600x900x24' node common/scripts/install-run-rush.js cover --verbose
        env:
          NODE_ENV: development

      - name: Rush cover (Windows/macOS)
        if: runner.os != 'Linux'
        shell: bash
        run: node common/scripts/install-run-rush.js cover --verbose
        env:
          NODE_ENV: development

      - name: Rush docs
        shell: bash
        run: node common/scripts/install-run-rush.js docs

      - name: Publish test results
        uses: mikepenz/action-junit-report@v5
        if: always()
        with:
          check_name: "Test Results (${{ matrix.os }})"
          report_paths: "**/junit_results.xml"
          include_passed: false
          detailed_summary: true
          commit: ${{ needs.trigger.outputs.sha }}
