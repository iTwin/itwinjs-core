# Slash Command: /test
#
# Replaces ADO's `/azp run imodeljs.imodeljs` comment trigger for fork PRs.
#
# When an org member or collaborator comments `/test` on a PR, this workflow
# checks out the PR code and runs the full CI build on GitHub-hosted runners.
#
# Security model:
#   - Only users with write access can trigger (prevents abuse from random commenters)
#   - Runs on GitHub-hosted runners only (no self-hosted runner exposure to fork code)
#   - Workflow file runs from default branch (issue_comment always does this)
#   - PR code is checked out and executed — same trust model as ADO's /azp run
#
# NOTE: issue_comment workflows only fire when present on the DEFAULT BRANCH.
# This file must be merged to master before the /test command will work.

name: "Slash Command: /test"

on:
  issue_comment:
    types: [created]

jobs:
  trigger:
    # Only run on PR comments (not issues) that start with /test
    if: >-
      github.event.issue.pull_request
      && startsWith(github.event.comment.body, '/test')
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.pr.outputs.sha }}
    permissions:
      pull-requests: read
      # Needed to add reaction to the comment
      issues: write
    steps:
      - name: Check permissions
        uses: actions/github-script@v7
        with:
          script: |
            const { data: perm } = await github.rest.repos.getCollaboratorPermissionLevel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              username: context.payload.comment.user.login,
            });
            if (!['admin', 'write'].includes(perm.permission)) {
              core.setFailed(`User ${context.payload.comment.user.login} does not have write access`);
              return;
            }
            // Acknowledge the command with a rocket reaction
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'rocket',
            });

      - name: Get PR details
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });
            core.setOutput('sha', pr.head.sha);
            core.info(`PR #${pr.number}: ${pr.head.sha} (${pr.head.ref})`);

  build:
    needs: trigger
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    permissions:
      checks: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.trigger.outputs.sha }}
          fetch-depth: 0

      - name: Setup Node.js 24.x
        uses: actions/setup-node@v4
        with:
          node-version: "24.x"

      - name: Git config
        shell: bash
        run: |
          git config --local user.email imodeljs-admin@users.noreply.github.com
          git config --local user.name imodeljs-admin

      - name: Rush check
        shell: bash
        run: node common/scripts/install-run-rush.js check

      - name: Rush change verification
        shell: bash
        run: |
          BRANCH_ARG=""
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            TARGET="${{ github.base_ref }}"
            if [[ "$TARGET" == *"release"* ]]; then
              BRANCH_ARG="-b origin/$TARGET"
            fi
          fi
          node common/scripts/install-run-rush.js change -v $BRANCH_ARG

      - name: Rush install
        uses: nick-fields/retry@v3
        with:
          command: node common/scripts/install-run-rush.js install
          max_attempts: 2
          timeout_minutes: 10

      - name: Rush audit
        shell: bash
        run: node common/scripts/install-run-rush.js audit
        continue-on-error: true

      - name: Set Rush build cache variables
        shell: bash
        run: |
          WRITE_ALLOWED=0
          if [ "$RUNNER_OS" = "Linux" ] && [ "${{ github.event_name }}" != "pull_request" ]; then
            WRITE_ALLOWED=1
          fi
          echo "RUSH_BUILD_CACHE_WRITE_ALLOWED=$WRITE_ALLOWED" >> "$GITHUB_ENV"

      - name: Rush build
        shell: bash
        run: node common/scripts/install-run-rush.js build -v -p max
        env:
          RUSH_BUILD_CACHE_CREDENTIAL: ${{ secrets.RUSH_BUILD_CACHE_SAS }}
          RUSH_BUILD_CACHE_ENABLED: ${{ secrets.RUSH_BUILD_CACHE_SAS != '' && '1' || '0' }}
          VITE_CI: "true"

      - name: Rush lint
        shell: bash
        run: node common/scripts/install-run-rush.js lint

      - name: Rush webpack:test
        shell: bash
        run: node common/scripts/install-run-rush.js webpack:test -v

      - name: Rush cover (Linux)
        if: runner.os == 'Linux'
        uses: nick-fields/retry@v3
        with:
          command: xvfb-run --auto-servernum --server-args='-screen 0, 1600x900x24' node common/scripts/install-run-rush.js cover --verbose
          max_attempts: 2
          timeout_minutes: 60
        env:
          NODE_ENV: development

      - name: Rush cover (Windows/macOS)
        if: runner.os != 'Linux'
        uses: nick-fields/retry@v3
        with:
          command: node common/scripts/install-run-rush.js cover --verbose
          max_attempts: 2
          timeout_minutes: 60
        env:
          NODE_ENV: development

      - name: Rush docs
        shell: bash
        run: node common/scripts/install-run-rush.js docs

      - name: Publish test results
        uses: mikepenz/action-junit-report@v5
        if: always()
        with:
          check_name: "Test Results (${{ matrix.os }})"
          report_paths: "**/junit_results.xml"
          include_passed: false
          detailed_summary: true
          commit: ${{ needs.trigger.outputs.sha }}
