# This config fakes successful status checks for pull requests that do not need the
# full CI suite. On most branches, that means docs/changelog-only changes detected by
# the changed-files step below. release/5.9.x is a special case: the branch is frozen
# and does not contain the newer CI workflow that emits the currently-required check
# names, so those checks are faked for every PR targeting that branch.
#
# While this config will fake a successful status check, it does *not* forego running the
# real status check. That needs to be handled by each status check events' own config;
# i.e., a Github Action's or Azure Pipeline's .yaml file.
#
# For example, if the extract-api status check is faked, the extract-api.yaml config
# needs to know for what files it should not run. (It will be faked as a successful
# check, so there is no need for it to run.)
#
# Why does this exist?
# The itwinjs-core repo requires certain status checks to be marked successful or
# neutral* to allow a pull request to be merged. Since some changes are limited in scope
# (e.g., a documentation change) or do not affect the application at all (e.g., a
# CODEOWNERS file change), there is no need to wait for or spend resources on every CI
# build to run.
#
# *Note: When Azure Pipeline builds (triggered by Azure DevOps webhooks) skip running due to
# path exclusions, their status checks are set neutral by Azure DevOps. This satisfies
# GitHub's "required" check and thus these status checks do not need to be faked below.

# HOW TO: Add New Files To The Exclusion List
# 1. Add the same paths to the "changed-files-specific" step below.
#    IMPORTANT NOTE: The tj-actions/changed-files globs are slightly different than GitHub
#    Actions' globs. There are at least two differences to be aware of:
#    1. GitHub Actions globs require quotes if they start with a * character,
#       tj-actions globs do not.
#    2. ** matches slightly differently. For example, GitHub actions "**.md" would be
#       tj-actions **/*.md.
# 2. For any status check that should potentially be skipped and/or faked, go to the
#    status check's config and add the relevant paths to the paths exclusion list.
#    ("paths-ignore" for Github Actions and "paths.exclude" for Azure Pipelines.)

name: Skip Check

on:
  pull_request:
    branches:
      - master
      - release/*

jobs:
  detect-if-skip:
    name: Detect If Skip
    runs-on: ubuntu-latest
    steps:
      # actions/checkout v6.0.3
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      # Check for certain paths having been modified
      - name: Get specific changed files
        id: changed-files-specific
        # tj-actions/changed-files v47.0.6
        uses: tj-actions/changed-files@9426d40962ed5378910ee2e21d5f8c6fcbf2dd96    # See https://github.com/marketplace/actions/changed-files
        with:
          files: |
            **/*.md
            docs/**
            .github/CODEOWNERS
            common/changes/**/*.json
            **/CHANGELOG.json
            **/CHANGELOG.md

      # release/5.9.x is frozen and does not contain the newer CI workflow that emits
      # these required check names, so fake them for every PR to that branch.
      # For other branches, only fake them for docs/changelog-only changes.
      # LouisBrunner/checks-action v3.1.0
      - uses: LouisBrunner/checks-action@937cbbcde3259005b50746dc91cde29098aac2ff   # See https://github.com/marketplace/actions/github-checks
        if: github.base_ref == 'release/5.9.x' || steps.changed-files-specific.outputs.only_modified == 'true'
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          name: rush check
          conclusion: success

      - uses: LouisBrunner/checks-action@937cbbcde3259005b50746dc91cde29098aac2ff
        if: github.base_ref == 'release/5.9.x' || steps.changed-files-specific.outputs.only_modified == 'true'
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          name: rush change
          conclusion: success

      - uses: LouisBrunner/checks-action@937cbbcde3259005b50746dc91cde29098aac2ff
        if: github.base_ref == 'release/5.9.x' || steps.changed-files-specific.outputs.only_modified == 'true'
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          name: rush audit
          conclusion: success

      - uses: LouisBrunner/checks-action@937cbbcde3259005b50746dc91cde29098aac2ff
        if: github.base_ref == 'release/5.9.x' || steps.changed-files-specific.outputs.only_modified == 'true'
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          name: rush lint + extract-api
          conclusion: success

      # Add more status checks below if necessary

      # TEMPLATE
      # - uses: LouisBrunner/checks-action@<full-length-commit-sha>   # vX.Y.Z
      #   if: github.base_ref == 'release/5.9.x' || steps.changed-files-specific.outputs.only_modified == 'true'
      #   with:
      #     token: ${{ secrets.GITHUB_TOKEN }}
      #     name: <name-of-any-status-check-to-simulate>
      #     conclusion: success
